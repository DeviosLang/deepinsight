# Project Config Template
# Copy to your K8s ConfigMap or local .env, replace placeholders with real values.
# DO NOT commit real credentials to git.

project:
  name: "cloud-platform"
  description: "Cloud virtual machine management platform"

# ── Repository List ──
# Replace URLs with your actual git remote URLs (include auth tokens in K8s Secret)
repos:
  - name: "platform-api"
    url: "<GIT_BASE_URL>/platform/api.git"
    branch: master
    language: python
    role: entry_point
    tags: ["api", "public-facing"]

  - name: "platform-console"
    url: "<GIT_BASE_URL>/platform/console-api.git"
    branch: master
    language: python
    role: entry_point
    tags: ["api", "public-facing"]

  - name: "compute-service"
    url: "<GIT_BASE_URL>/compute/service.git"
    branch: master
    language: python
    role: core
    tags: ["compute"]

  - name: "compute-framework"
    url: "<GIT_BASE_URL>/compute/framework.git"
    branch: master
    language: python
    role: shared_lib
    tags: ["framework", "shared"]

  - name: "platform-db"
    url: "<GIT_BASE_URL>/platform/database.git"
    branch: master
    language: python
    role: core
    tags: ["database", "storage"]

  - name: "scheduler-service"
    url: "<GIT_BASE_URL>/platform/scheduler.git"
    branch: master
    language: python
    role: service
    tags: ["scheduler"]

  - name: "gateway-service"
    url: "<GIT_BASE_URL>/platform/gateway.git"
    branch: master
    language: python
    role: service
    tags: ["gateway", "auth"]

  # Terminal / lowest-layer module (DAO/DB/storage) — downstream-chain [SINK] anchor.
  - name: "vstation_compute"
    url: "<GIT_BASE_URL>/compute/vstation.git"
    branch: master
    language: python
    role: sink
    tags: ["compute", "storage", "sink"]

# ── How role drives analysis (RUNTIME-EFFECTIVE) ──
# The pipeline reads each repo's `role` field directly:
#   role: entry_point  → [ENTRY] — upward call-chain targets ("who calls the change")
#   role: sink         → [SINK]  — downstream-chain convergence anchors ("what the change calls")
#   role: shared_lib / core / service → ordinary repo
# A repo's role lives on its own list item above — single source of truth, no
# separate arrays to keep in sync. (A legacy `repos.entry_points` / `repos.sinks`
# map form is still accepted for backward compatibility, but the list+role form
# above is preferred.)

# ── Knowledge Base (optional, multi-entry) ──
# Declares external knowledge bases (design docs, runbooks, glossaries...) that
# pi workers can query on demand at analysis time. Each entry is indexed into
# its own graphify graph and exposed to pi via
#   `graphify query "<question>" --graph <path> --budget 1500`.
#
# Routing: each entry advertises `description` + `keywords` so pi can decide
# which (if any) library to consult based on diff content. Multi-library queries
# are allowed but discouraged — pick the most relevant one per question.
#
# Two indexing modes:
#   prebuilt: false (default) — indexer runs `graphify extract` daily and
#     writes graph.json under /data/workspace/.deepinsight/knowledge-graphs/<name>/
#   prebuilt: true — graph.json already lives inside the repo at <repo>/<paths>/graphify-out/graph.json
#     (e.g. every_thing_cvm ships pre-built graphs); indexer skips extract and only verifies presence.
knowledge_base:
  # Architecture / design decisions — built daily by the indexer.
  # Path: ai_docs/cvm_docs/ (882 files)
  # Previously used cvm_docs_v2/ (1879 files) which caused graphify ETIMEDOUT after 3600s.
  - name: "cvm_design_docs"
    repo: "ai_docs"
    type: "graphify"
    paths:
      - "cvm_docs/"
    description: "CVM 平台架构决策、设计文档、glossary、pitfalls"
    keywords: ["架构", "设计决策", "design", "architecture", "glossary", "pitfall", "为什么"]

  # Domain knowledge (instance specs, images, billing concepts) — pre-built
  - name: "cvm_domain"
    repo: "every_thing_cvm"
    type: "graphify"
    prebuilt: true
    paths:
      - "domain-base/"
    description: "CVM 领域知识：实例规格、镜像类型、专有预扣资源池、计费等业务概念"
    keywords: ["实例规格", "镜像", "计费", "资源池", "domain", "业务概念"]

  # External API specs — pre-built
  - name: "cvm_apidocs"
    repo: "every_thing_cvm"
    type: "graphify"
    prebuilt: true
    paths:
      - "api-base/cvm/"
    description: "CVM 对外接口文档（v20170312），含入参/返回/错误码"
    keywords: ["API", "接口", "入参", "返回", "错误码", "v20170312"]

  # Bugs found during release windows — pre-built
  - name: "cvm_released_bugs"
    repo: "every_thing_cvm"
    type: "graphify"
    prebuilt: true
    paths:
      - "released-base/"
    description: "发布期间出现过的 bug 记录，按 release 单 ID 索引"
    keywords: ["bug", "released", "发布", "回滚", "故障", "历史问题"]

  # Bugs / requirements from daily iteration (TAPD) — pre-built
  - name: "cvm_tapd_bugs"
    repo: "every_thing_cvm"
    type: "graphify"
    prebuilt: true
    paths:
      - "tapd-base/"
    description: "日常迭代版本 TAPD 上的 bug 与需求记录"
    keywords: ["tapd", "迭代", "需求", "日常 bug", "缺陷"]

# ── Internal Package Mapping ──
internal_packages:
  prefixes:
    - prefix: "platform_"
      repos: ["platform-api", "platform-console", "platform-db"]
    - prefix: "compute_"
      repos: ["compute-service", "compute-framework"]
  explicit:
    - package: "common_utils"
      repo: "compute-framework"
    - package: "gateway_client"
      repo: "gateway-service"

# ── Risk Patterns ──
risk_patterns:
  high_risk_dirs:
    - "*/auth/*"
    - "*/payment/*"
    - "*/security/*"
    - "*/billing/*"
    - "*/keypair/*"
  api_dirs:
    - "*/api/*"
    - "*/views/*"
    - "*/routes/*"
    - "*/controllers/*"

# ── Runtime Call Detection ──
runtime_calls:
  http:
    framework_patterns:
      - "ServiceClient"
      - "api_client"
      - "requests.get"
      - "requests.post"
      - "httpx.AsyncClient"
    route_patterns:
      - "@app.route"
      - "@router."
      - "urlpatterns"
      - "path("
  mq:
    type: "rabbitmq"
    library: "pika"
    producer_patterns:
      - "basic_publish"
      - "channel.publish"
      - "send_message"
    consumer_patterns:
      - "basic_consume"
      - "queue_bind"
      - "on_message"
    naming_convention: "{service}.{entity}.{action}"

# ── LLM Configuration ──
# API keys should be injected via K8s Secret → env var, not hardcoded here.
llm:
  analysis:
    base_url: "<LLM_BASE_URL>"
    api_key_env: "LLM_ANALYSIS_API_KEY"
    model: "deepseek-v4-pro"
  utility:
    base_url: "<LLM_BASE_URL>"
    api_key_env: "LLM_UTILITY_API_KEY"
    model: "deepseek-v4-pro"

# ── Output Configuration ──
output:
  include_test_plan: true
  include_oracle: true
  call_tree_depth: 2
  language: "zh-CN"

# ── Analysis Mode ──
# accuracy_first: multi-round verification, cross-validation (higher cost)
# budget_balanced: single-round, skip cross-validation (lower cost)
analysis_mode: accuracy_first
