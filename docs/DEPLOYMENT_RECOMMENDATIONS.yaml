---
# Configuration for extended concurrency tuning (TIER 2)
# Save as ConfigMap and reference in deployment if needed
apiVersion: v1
kind: ConfigMap
metadata:
  name: deepinsight-concurrency-config
  namespace: rag-etl
data:
  # Pre-filter concurrency tuning
  coarse-filter-concurrency: "10"   # Batch size for git grep (10 repos/batch)
  coarse-filter-timeout-ms: "30000" # Timeout per git grep operation
  
  # Worker concurrency tuning
  max-parallel-workers: "4"         # Pi agent parallel workers (4 for ≤30 symbols, 2 for >30)
  max-target-repos: "10"            # Max repos to analyze (from pre-filter)
  
  # Timeout tuning
  pi-worker-timeout-ms: "600000"    # Pi agent timeout (10 minutes)
  pi-steer-ratio: "0.85"            # Steer signal at 85% of timeout
  pi-stream-grace-ms: "15000"       # Grace period for final JSON output
  
  # Queue tuning
  max-concurrent-tasks: "200"       # Max tasks in memory
  task-max-age-days: "30"           # Auto-cleanup task age
  
  # LLM related
  agents-md-max-chars: "40000"      # Max AGENTS.md size (~10K tokens)
  
  # NFS tuning (TIER 3)
  nfs-cache-ttl-seconds: "300"      # Cache git grep results for 5 min

