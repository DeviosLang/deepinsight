apiVersion: batch/v1beta1
kind: CronJob
metadata:
  name: deepinsight-repo-sync
  namespace: rag-etl
spec:
  schedule: "*/30 * * * *"  # Every 30 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600  # 10 min max
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: memorix-base
          containers:
            - name: sync
              image: bitnami/git:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "[repo-sync] Starting sync at $(date)"
                  WORKSPACE="/data/workspace"
                  SUCCESS=0
                  FAIL=0

                  for repo_dir in "$WORKSPACE"/*/; do
                    if [ ! -d "$repo_dir/.git" ]; then
                      continue
                    fi

                    repo_name=$(basename "$repo_dir")
                    echo -n "[repo-sync] Fetching $repo_name... "

                    if ! git -C "$repo_dir" fetch origin --prune --quiet 2>/dev/null; then
                      echo "FETCH-FAILED"
                      FAIL=$((FAIL + 1))
                      continue
                    fi

                    # Never follow whatever branch a human left checked out in
                    # the worktree (e.g. a debug feature branch) — always sync
                    # the canonical default branch so indexer/agents-md refresh
                    # sees a stable tree, and so feature-branch commits don't
                    # strand the worktree on a stale ref.
                    git -C "$repo_dir" config gc.auto 0
                    default_branch=$(git -C "$repo_dir" symbolic-ref --quiet --short refs/remotes/origin/HEAD 2>/dev/null | sed 's@^origin/@@')
                    if [ -z "$default_branch" ]; then
                      if git -C "$repo_dir" rev-parse --verify --quiet origin/master >/dev/null 2>&1; then
                        default_branch=master
                      elif git -C "$repo_dir" rev-parse --verify --quiet origin/main >/dev/null 2>&1; then
                        default_branch=main
                      fi
                    fi

                    if [ -z "$default_branch" ]; then
                      echo "NO-DEFAULT-BRANCH"
                      FAIL=$((FAIL + 1))
                      continue
                    fi

                    current_branch=$(git -C "$repo_dir" branch --show-current 2>/dev/null)
                    if [ -n "$current_branch" ] && [ "$current_branch" != "$default_branch" ]; then
                      # -f discards any stray worktree changes left by debug sessions.
                      git -C "$repo_dir" checkout -f -q "$default_branch" 2>/dev/null || true
                    fi

                    # Check the return code — a failed reset (e.g. missing
                    # origin/<default>) must NOT be masked as OK.
                    if git -C "$repo_dir" reset --hard "origin/$default_branch" --quiet 2>/dev/null; then
                      echo "OK ($default_branch)"
                      SUCCESS=$((SUCCESS + 1))
                    else
                      echo "RESET-FAILED ($default_branch)"
                      FAIL=$((FAIL + 1))
                    fi
                  done

                  echo "[repo-sync] Done: $SUCCESS succeeded, $FAIL failed"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: workspace
                  mountPath: /data/workspace
          volumes:
            - name: workspace
              persistentVolumeClaim:
                claimName: shirakami-workspace-nfs
