apiVersion: batch/v1beta1
kind: CronJob
metadata:
  name: deepinsight-repo-sync
  namespace: rag-etl
spec:
  schedule: "*/30 * * * *"  # Every 30 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600  # 10 min max
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: memorix-base
          containers:
            - name: sync
              image: bitnami/git:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "[repo-sync] Starting sync at $(date)"
                  WORKSPACE="/data/workspace"
                  SUCCESS=0
                  FAIL=0

                  for repo_dir in "$WORKSPACE"/*/; do
                    if [ ! -d "$repo_dir/.git" ]; then
                      continue
                    fi

                    repo_name=$(basename "$repo_dir")
                    echo -n "[repo-sync] Fetching $repo_name... "

                    if git -C "$repo_dir" fetch origin --prune --quiet 2>/dev/null; then
                      # Fast-forward current branch to origin (never gc old commits)
                      git -C "$repo_dir" config gc.auto 0
                      current_branch=$(git -C "$repo_dir" branch --show-current 2>/dev/null)
                      if [ -n "$current_branch" ]; then
                        git -C "$repo_dir" reset --hard "origin/$current_branch" --quiet 2>/dev/null
                      fi
                      echo "OK"
                      SUCCESS=$((SUCCESS + 1))
                    else
                      echo "FAILED"
                      FAIL=$((FAIL + 1))
                    fi
                  done

                  echo "[repo-sync] Done: $SUCCESS succeeded, $FAIL failed"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: workspace
                  mountPath: /data/workspace
          volumes:
            - name: workspace
              persistentVolumeClaim:
                claimName: shirakami-workspace-nfs
