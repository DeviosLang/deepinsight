apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepinsight-server
  namespace: rag-etl
  labels:
    app: deepinsight-server
spec:
  # 2 replicas × MAX_CONCURRENT_TASKS=2 = 4 concurrent analyses cluster-wide.
  # State is shared via NFS (`/data/workspace/.deepinsight/tasks/*.json`):
  # - GET handlers fall back to NFS when in-memory cache misses
  # - DELETE only works on the Pod that owns the task (returns 409 otherwise)
  # - Pod startup uses a 60-min staleness threshold for orphan recovery so
  #   one Pod's restart doesn't mark sibling Pods' live tasks as failed
  replicas: 2
  selector:
    matchLabels:
      app: deepinsight-server
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: deepinsight-server
    spec:
      # Give in-flight analyses up to 15 min to wrap up when this Pod is
      # marked for termination (rolling update or HPA scale-down). The
      # pipeline tops out around 9-15 min; killing mid-run wastes the
      # work and surfaces "orphaned by service restart" to the caller.
      # The Deployment's readinessProbe also stops sending new requests
      # to a terminating Pod, so it'll drain naturally during this window.
      terminationGracePeriodSeconds: 900
      containers:
        - name: server
          image: mirrors.tencent.com/cvm/deepinsight:latest
          imagePullPolicy: Always
          command: ["node", "packages/analysis-service/dist/index.js"]
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: WORKSPACE_DIR
              value: "/data/workspace"
            - name: SCRATCH_DIR
              value: "/data/scratch"
            - name: PROJECT_CONFIG_PATH
              value: "/etc/deepinsight/project.yml"
            # LLM credentials from Secret
            - name: LLM_ANALYSIS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: deepinsight-secrets
                  key: llm-api-key
            # graphify reads TOKENHUB_API_KEY for the custom provider declared
            # in /root/.graphify/providers.json. Re-uses the same secret.
            - name: TOKENHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: deepinsight-secrets
                  key: llm-api-key
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: deepinsight-secrets
                  key: llm-base-url
            - name: LLM_MODEL
              value: "deepseek-v4-pro"
            # Concurrency gate: how many analyses may run concurrently in this
            # Pod. Each analysis spawns up to 4 pi workers, so 2 concurrent
            # tasks ≈ 8 pi processes ≈ peak 4-6 GiB. Tasks beyond this stay in
            # "queued" state and start when a slot frees up. Scale throughput
            # horizontally (replicas), not by raising this number.
            - name: MAX_CONCURRENT_TASKS
              value: "2"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: workspace
              mountPath: /data/workspace
            - name: scratch
              mountPath: /data/scratch
            - name: config
              mountPath: /etc/deepinsight
              readOnly: true
      imagePullSecrets:
        - name: memorix-base
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: shirakami-workspace-nfs
        - name: scratch
          emptyDir:
            sizeLimit: 20Gi
        - name: config
          configMap:
            name: deepinsight-config
