apiVersion: batch/v1beta1
kind: CronJob
metadata:
  name: deepinsight-agents-md-refresh
  namespace: rag-etl
  labels:
    app: deepinsight-server
spec:
  schedule: "23 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 14400
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: memorix-base
          containers:
            - name: indexer
              image: mirrors.tencent.com/cvm/deepinsight:latest
              imagePullPolicy: Always
              command: ["npx", "tsx", "packages/indexer/src/generate-layer1.ts", "--workspace", "/data/workspace"]
              env:
                - name: TZ
                  value: Asia/Shanghai
                - name: PROJECT_CONFIG_PATH
                  value: "/etc/deepinsight/project.yml"
                # LLM_ANALYSIS_API_KEY: indexer fallback when graphify env not set
                # TOKENHUB_API_KEY: read directly by graphify (custom provider)
                # Both bound to same secret — single source of truth.
                - name: LLM_ANALYSIS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: deepinsight-secrets
                      key: llm-api-key
                - name: TOKENHUB_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: deepinsight-secrets
                      key: llm-api-key
              volumeMounts:
                - name: workspace
                  mountPath: /data/workspace
                - name: config
                  mountPath: /etc/deepinsight
                  readOnly: true
          volumes:
            - name: workspace
              persistentVolumeClaim:
                claimName: shirakami-workspace-nfs
            - name: config
              configMap:
                name: deepinsight-config
