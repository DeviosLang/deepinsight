# Secret Template — apply manually, NEVER commit real values
apiVersion: v1
kind: Secret
metadata:
  name: deepinsight-secrets
  namespace: rag-etl
type: Opaque
stringData:
  llm-api-key: "<YOUR_LLM_API_KEY>"
  # LLM endpoint base URL. MUST be the API ROOT, NOT the full chat endpoint.
  # Correct:   https://<your-llm-host>/v1
  # WRONG:      https://<your-llm-host>/v1/chat/completions  ← 404
  # The pipeline appends "/chat/completions" itself (see summarizeDiff in
  # pipeline.ts). pi uses its own baseUrl from ~/.pi/agent/models.json and
  # does NOT read this env var, so this value only affects the diff-summarizer.
  llm-base-url: "<YOUR_LLM_BASE_URL_API_ROOT>"
  # Opik observability endpoint — internal IP, do NOT commit real values.
  opik-base-url: "<YOUR_OPIK_BASE_URL>"
  opik-project: "<YOUR_OPIK_PROJECT>"
